<html lang="zh-TW">

    <style>

        .container { background: white; padding: 1.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 420px; box-sizing: border-box; position: relative; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.8rem; font-weight: bold; color: #94a3b8; }
        .question-text { font-size: 2.2rem; font-weight: 800; margin: 25px 0; text-align: center; color: #1e293b; min-height: 80px; display: flex; align-items: center; justify-content: center; word-break: break-word; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button.option-btn { padding: 16px; border: 2px solid #f1f5f9; border-radius: 16px; background: #fff; cursor: pointer; font-size: 1.1rem; color: #475569; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
        button.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        button.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        .action-btns { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .star-btn { background: none; border: 1px solid #e2e8f0; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .star-active { background: #fff9db; border-color: var(--star); color: var(--star); transform: scale(1.1); }
        .report-section { margin-top: 30px; width: 100%; max-width: 420px; }
        .card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th, td { padding: 10px 5px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .tag-star { color: var(--star); font-weight: bold; }
        .badge-err { padding: 2px 6px; border-radius: 4px; background: #fee2e2; color: #ef4444; font-size: 0.75rem; font-weight: bold; }
        #feedback { height: 24px; margin-top: 15px; text-align: center; font-weight: bold; font-size: 0.95rem; }
        .hidden { display: none; }
    </style>

<body>

        <span>正確率: <span id="accuracy">0%</span></span>

    <div id="question" class="question-text">載入中...</div>
    <div id="options" class="options-grid"></div>
    <div id="feedback"></div>
    <div class="action-btns">
        <button class="star-btn" id="star-btn" onclick="toggleStar()">⭐</button>
    </div>
</div>

        <div id="full-report" class="hidden">

    <button onclick="resetAll()" style="width:100%; margin-top:15px; background:none; border:none; color:#cbd5e1; font-size:0.7rem; text-decoration:underline; cursor:pointer;">清空所有學習數據</button>
</div>

let db = JSON.parse(localStorage.getItem('vocab_v3_full')) || {
    errors: {}, stars: [], correctCount: 0, totalCount: 0
};

let currentWord = null;
let canClick = true;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function nextQuestion() {
    canClick = true;
    currentWord = vocabList[Math.floor(Math.random() * vocabList.length)];
    const isEngToChn = Math.random() > 0.5;
    
    document.getElementById('question').innerText = isEngToChn ? currentWord.eng : currentWord.chn;
    document.getElementById('feedback').innerText = "";
    document.getElementById('star-btn').classList.remove('star-active');

    let options = [isEngToChn ? currentWord.chn : currentWord.eng];
    while(options.length < 4) {
        let rand = vocabList[Math.floor(Math.random() * vocabList.length)];
        let val = isEngToChn ? rand.chn : rand.eng;
        if(!options.includes(val)) options.push(val);
    }
    shuffle(options);

    const grid = document.getElementById('options');
    grid.innerHTML = '';
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => check(opt, isEngToChn ? currentWord.chn : currentWord.eng, btn);
        grid.appendChild(btn);
    });
    updateStats();
}

function check(selected, correct, btn) {
    if(!canClick) return;
    canClick = false;
    db.totalCount++;
    
    if(selected === correct) {
        btn.classList.add('correct');
        db.correctCount++;
        setTimeout(nextQuestion, 500); // 縮短為 0.5 秒
    } else {
        btn.classList.add('wrong');
        document.getElementById('feedback').innerHTML = `<span style="color:var(--danger)">正確：${correct}</span>`;
        db.errors[currentWord.eng] = (db.errors[currentWord.eng] || 0) + 1;
        setTimeout(nextQuestion, 1200);
    }
    save();
}

function toggleStar() {
    if(!currentWord) return;
    const btn = document.getElementById('star-btn');
    const index = db.stars.indexOf(currentWord.eng);
    if(index > -1) {
        db.stars.splice(index, 1);
        btn.classList.remove('star-active');
    } else {
        db.stars.push(currentWord.eng);
        btn.classList.add('star-active');
    }
    save();
}

function updateStats() {
    document.getElementById('done-count').innerText = db.totalCount;
    const acc = db.totalCount === 0 ? 0 : Math.round((db.correctCount/db.totalCount)*100);
    document.getElementById('accuracy').innerText = acc + "%";
}

function renderReport() {
    const tbody = document.getElementById('report-body');
    tbody.innerHTML = '';
    const allWords = new Set([...Object.keys(db.errors), ...db.stars]);
    
    // 將錯誤次數多的排在前面
    const sortedWords = Array.from(allWords).sort((a, b) => (db.errors[b] || 0) - (db.errors[a] || 0));

    sortedWords.forEach(eng => {
        const item = vocabList.find(v => v.eng === eng) || {chn: "N/A"};
        const errs = db.errors[eng] || 0;
        const starred = db.stars.includes(eng);
        const row = `<tr><td>${eng}</td><td>${item.chn}</td><td>${errs > 0 ? `<span class="badge-err">錯 ${errs}</span>` : ''} ${starred ? '<span class="tag-star">⭐</span>' : ''}</td></tr>`;
        tbody.innerHTML += row;
    });
}

function toggleReport() {
    const report = document.getElementById('full-report');
    if(report.classList.contains('hidden')) {
        renderReport();
        report.classList.remove('hidden');
    } else {
        report.classList.add('hidden');
    }
}

function save() { localStorage.setItem('vocab_v3_full', JSON.stringify(db)); }
function resetAll() { if(confirm("確定重置所有數據？")) { localStorage.clear(); location.reload(); } }

nextQuestion();
</script>
